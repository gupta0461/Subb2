<svg viewBox="0 0 1024 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="subb2">
  <g id="icon">
    <!-- Recurring loop: two curved arrows forming a continuous cycle -->
    <!-- Top arc (coral) sweeping clockwise -->
    <path d="M 256 120
             A 136 136 0 0 1 392 256"
          fill="none" stroke="#FF5A5F" stroke-width="40" stroke-linecap="round"/>
    <!-- Bottom arc (amber) sweeping clockwise -->
    <path d="M 256 392
             A 136 136 0 0 1 120 256"
          fill="none" stroke="#FF8A3D" stroke-width="40" stroke-linecap="round"/>
    <!-- Coral arrowhead pointing down at end of top arc -->
    <path d="M 392 256 L 364 214 L 420 214 Z" fill="#FF5A5F"/>
    <!-- Amber arrowhead pointing up at end of bottom arc -->
    <path d="M 120 256 L 148 298 L 92 298 Z" fill="#FF8A3D"/>
    <!-- Central node: subtle hub representing the recurring renewal point -->
    <circle cx="256" cy="256" r="34" fill="#1C1B1F"/>
    <circle cx="256" cy="256" r="14" fill="#FF5A5F"/>
  </g>

  <g id="wordmark">
    <text x="468" y="256" dominant-baseline="central"
          font-family="Helvetica, Arial, sans-serif"
          font-size="200" font-weight="700"
          letter-spacing="-10" fill="#1C1B1F">subb2</text>
  </g>
</svg>
